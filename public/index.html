<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Interview Q&A Generator</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 40px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 40px;
    }

    select, button {
      padding: 12px 18px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .question-card {
      background: white;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 25px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }

    .label {
      font-size: 13px;
      font-weight: 700;
      color: #2563eb;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .question {
      font-size: 20px;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .answer-btn {
      background: #10b981;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 15px;
    }

    .answer-btn:hover {
      background: #059669;
    }

    .answer-box {
      display: none;
      margin-top: 18px;
      padding: 16px;
      background: #f9fafb;
      border-left: 4px solid #10b981;
      border-radius: 6px;
      
      color: #111827;
      font-size: 25px;
      line-height: 1.6;
      text-align: justify;
      text-justify: inter-word;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Interview Q&A Generator</h1>

    <div class="controls">
    <select id="role">
        <option value="admin">Admin</option>
        <option value="general">General</option>
        <option value="hr">HR</option>
        <option value="marketing">Marketing</option>
        <option value="sales">Sales</option>
        <option value="tech">Tech</option>
    </select>

    <button onclick="loadQA()">Generate</button>
    <button onclick="downloadQA()">Download Q&A</button>
    </div>


    <div id="questions"></div>
  </div>
<script>
  let currentQA = null;

  async function readFile(path) {
    const res = await fetch(path);

    if (!res.ok) {
      throw new Error("Cannot load: " + path);
    }

    const text = await res.text();

    return text
      .split("\n")
      .map(l => l.trim())
      .filter(Boolean);
  }

  function stripNumber(text) {
    return text.replace(/^\s*\d+\s*[\.\)\-]\s*/, "").trim();
  }

  function randomIndex(max) {
    return Math.floor(Math.random() * max);
  }

  async function getQA(role, type) {
    const qPath = `/interview_questions/${role}/${type}.txt`;
    const aPath = `/interview_answer/${role}/${type}.txt`;

    const [questions, answers] = await Promise.all([
      readFile(qPath),
      readFile(aPath)
    ]);

    const n = Math.min(questions.length, answers.length);

    if (n === 0) {
      return {
        question: "No data",
        answer: "No data"
      };
    }

    const index = randomIndex(n);

    return {
      question: stripNumber(questions[index]),
      answer: stripNumber(answers[index])
    };
  }

  async function loadQA() {
    const role = document.getElementById("role").value;

    try {
      const data = {
        introduction: await getQA(role, "introduction"),
        behavioral: await getQA(role, "behavioral"),
        skills: await getQA(role, "skills"),
        situational: await getQA(role, "situational"),
        closing: await getQA(role, "closing")
      };

      currentQA = data;

      const container = document.getElementById("questions");
      container.innerHTML = "";

      const sections = [
        ["Introduction", data.introduction],
        ["Behavioral", data.behavioral],
        ["Skills", data.skills],
        ["Situational", data.situational],
        ["Closing", data.closing]
      ];

      sections.forEach(([label, obj]) => {
        const card = document.createElement("div");
        card.className = "question-card";

        card.innerHTML = `
          <div class="label">${label}</div>
          <div class="question">${obj.question}</div>

          <button class="answer-btn" onclick="toggleAnswer(this)">
            Show Answer
          </button>

          <div class="answer-box">
            ${obj.answer}
          </div>
        `;

        container.appendChild(card);
      });

    } catch (err) {
      alert(err.message);
      console.error(err);
    }
  }

  function toggleAnswer(btn) {
    const box = btn.nextElementSibling;
    const open = box.style.display === "block";

    document.querySelectorAll(".answer-box")
      .forEach(b => (b.style.display = "none"));

    box.style.display = open ? "none" : "block";
    btn.textContent = open ? "Show Answer" : "Hide Answer";
  }

  function downloadQA() {
    if (!currentQA) {
      alert("Please generate questions first.");
      return;
    }

    let content = "";
    let qNum = 1;

    const order = [
      currentQA.introduction,
      currentQA.behavioral,
      currentQA.skills,
      currentQA.situational,
      currentQA.closing
    ];

    order.forEach(item => {
      content += `Q${qNum}: ${item.question}\n`;
      content += `A${qNum}: ${item.answer}\n\n`;
      qNum++;
    });

    const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "interview_QA.txt";
    a.click();

    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
